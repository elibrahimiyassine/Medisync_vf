version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: medisync_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-medisync}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medisync_secret}
      POSTGRES_DB: ${POSTGRES_DB:-medisync}
    ports:
      - '5432:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-medisync}']
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: medisync_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@medisync.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - '5050:80'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medisync_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-medisync}:${POSTGRES_PASSWORD:-medisync_secret}@postgres:5432/${POSTGRES_DB:-medisync}
      NODE_ENV: production
    env_file:
      - ./backend/.env
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads

volumes:
  pg_data:
  pgadmin_data:
