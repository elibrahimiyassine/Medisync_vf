<div class="medi-wrapper"
     [class.is-tilting]="isTilting"
     [class.is-shaking]="isShaking"
     [style.width.px]="size"
     [style.height.px]="size * 1.15">
  <svg viewBox="0 0 120 138" xmlns="http://www.w3.org/2000/svg" overflow="visible">

    <!-- Tail -->
    <path class="tail" [class.wagging]="isWagging"
      d="M 83 98 Q 112 78 106 56 Q 100 42 88 53"
      stroke="#E8701A" stroke-width="11"
      fill="none" stroke-linecap="round"/>

    <!-- Body -->
    <ellipse cx="60" cy="98" rx="30" ry="32" fill="#F07020"/>

    <!-- Doctor coat -->
    <path d="M 38 84 Q 36 128 60 130 Q 84 128 82 84 Z"
      fill="white" opacity="0.93"/>
    <line x1="60" y1="84" x2="60" y2="130"
      stroke="#E0E0E0" stroke-width="1.5"/>
    <path d="M 38 84 L 52 97 L 58 84 Z" fill="#ECECEC"/>
    <path d="M 82 84 L 68 97 L 62 84 Z" fill="#ECECEC"/>

    <!-- Stethoscope -->
    <path d="M 48 92 Q 42 108 50 114 Q 57 120 64 114"
      stroke="#00D4FF" stroke-width="2.2"
      fill="none" stroke-linecap="round"/>
    <circle cx="64" cy="114" r="4.5" fill="#00D4FF" opacity="0.9"/>
    <circle cx="64" cy="114" r="2.5" fill="#070B14"/>

    <!-- Head -->
    <ellipse cx="60" cy="52" rx="28" ry="26" fill="#F07020"/>

    <!-- Ears -->
    <polygon points="32,32 20,6 44,22"  fill="#F07020"/>
    <polygon points="88,32 100,6 76,22" fill="#F07020"/>
    <polygon points="33,30 24,12 41,23"  fill="#FF9A5C"/>
    <polygon points="87,30 96,12 79,23"  fill="#FF9A5C"/>

    <!-- Snout -->
    <ellipse cx="60" cy="63" rx="16" ry="12" fill="#FFB87A"/>

    <!-- Nose -->
    <ellipse cx="60" cy="57" rx="4.5" ry="3.2" fill="#1A0A00"/>

    <!-- Eye anchor -->
    <rect class="medi-eye-anchor" x="40" y="40" width="40" height="20"
      fill="transparent"/>

    <!-- Eyes -->
    @if (!eyesCovered) {
      <g>
        <circle cx="47" cy="47" r="7.5" fill="white"/>
        <circle [attr.cx]="47 + eyeOffsetX" [attr.cy]="47 + eyeOffsetY"
          r="4" fill="#1A0A00"/>
        <circle [attr.cx]="48.5 + eyeOffsetX" [attr.cy]="45.5 + eyeOffsetY"
          r="1.5" fill="white"/>
        <circle cx="73" cy="47" r="7.5" fill="white"/>
        <circle [attr.cx]="73 + eyeOffsetX" [attr.cy]="47 + eyeOffsetY"
          r="4" fill="#1A0A00"/>
        <circle [attr.cx]="74.5 + eyeOffsetX" [attr.cy]="45.5 + eyeOffsetY"
          r="1.5" fill="white"/>
      </g>
    }

    <!-- Closed eyes (X) when password visible -->
    @if (eyesCovered) {
      <g class="closed-eyes-anim">
        <line x1="42" y1="42" x2="52" y2="52" stroke="#1A0A00" stroke-width="3" stroke-linecap="round"/>
        <line x1="52" y1="42" x2="42" y2="52" stroke="#1A0A00" stroke-width="3" stroke-linecap="round"/>
        <line x1="68" y1="42" x2="78" y2="52" stroke="#1A0A00" stroke-width="3" stroke-linecap="round"/>
        <line x1="78" y1="42" x2="68" y2="52" stroke="#1A0A00" stroke-width="3" stroke-linecap="round"/>
      </g>
    }

    <!-- Mouth -->
    @if (!isShaking) {
      <path d="M 54 69 Q 60 75 66 69"
        stroke="#1A0A00" stroke-width="2.2"
        fill="none" stroke-linecap="round"/>
    }
    @if (isShaking) {
      <path d="M 54 73 Q 60 67 66 73"
        stroke="#1A0A00" stroke-width="2.2"
        fill="none" stroke-linecap="round"/>
    }

    <!-- Blush -->
    <ellipse cx="39" cy="61" rx="7" ry="4.5" fill="#FF9A5C" opacity="0.35"/>
    <ellipse cx="81" cy="61" rx="7" ry="4.5" fill="#FF9A5C" opacity="0.35"/>

    <!-- Paws -->
    <g class="paw-left" [class.covering]="eyesCovered">
      <ellipse cx="34" cy="112" rx="11" ry="9" fill="#F07020"/>
      <circle cx="27" cy="109" r="5"  fill="#F07020"/>
      <circle cx="41" cy="109" r="5"  fill="#F07020"/>
      <line x1="27" y1="108" x2="27" y2="113" stroke="#CC5A10" stroke-width="1" stroke-linecap="round"/>
      <line x1="34" y1="106" x2="34" y2="112" stroke="#CC5A10" stroke-width="1" stroke-linecap="round"/>
      <line x1="41" y1="108" x2="41" y2="113" stroke="#CC5A10" stroke-width="1" stroke-linecap="round"/>
    </g>
    <g class="paw-right" [class.covering]="eyesCovered">
      <ellipse cx="86" cy="112" rx="11" ry="9" fill="#F07020"/>
      <circle cx="79" cy="109" r="5"  fill="#F07020"/>
      <circle cx="93" cy="109" r="5"  fill="#F07020"/>
      <line x1="79" y1="108" x2="79" y2="113" stroke="#CC5A10" stroke-width="1" stroke-linecap="round"/>
      <line x1="86" y1="106" x2="86" y2="112" stroke="#CC5A10" stroke-width="1" stroke-linecap="round"/>
      <line x1="93" y1="108" x2="93" y2="113" stroke="#CC5A10" stroke-width="1" stroke-linecap="round"/>
    </g>

  </svg>
</div>
